<script src="site.js"></script>
<script>
(function () {
  var form = document.getElementById("contact-form");
  var ok = document.getElementById("form-success");
  if (!form) return;
  form.addEventListener("submit", function (e) {
    e.preventDefault();
    var name = form.querySelector("#f-name").value.trim();
    var email = form.querySelector("#f-email").value.trim();
    var msg = form.querySelector("#f-msg").value.trim();
    if (!name || !email || !msg) {
      ok.textContent = "กรุณากรอกข้อมูลให้ครบทุกช่อง";
      ok.style.color = "#B23A2E";
      ok.classList.add("is-shown");
      return;
    }
    ok.textContent = "ขอบคุณคุณ " + name.split(" ")[0] + " — เราจะติดต่อกลับภายใน 2 วันทำการ";
    ok.style.color = "var(--green)";
    ok.classList.add("is-shown");
    form.reset();
  });
})();
</script>
